{{- $src := .Get "src" -}}
<div class="excalidraw-diagram" data-src="{{ $src }}"><p><em>Loading diagram...</em></p></div>

{{- if not (.Page.Scratch.Get "excalidraw-loaded") -}}
{{- .Page.Scratch.Set "excalidraw-loaded" true -}}
<style>
.excalidraw-diagram { display: flex; justify-content: center; margin: 1.5rem 0; }
.excalidraw-diagram svg { max-width: 100%; height: auto; }
</style>
<script type="module">
import { exportToSvg } from "https://esm.sh/@excalidraw/excalidraw@0.18.0?bundle-deps";

document.querySelectorAll('.excalidraw-diagram').forEach(async (container) => {
  const src = container.getAttribute('data-src');
  if (!src) return;
  try {
    const json = await (await fetch(src)).json();
    const svgEl = await exportToSvg({
      elements: json.elements,
      appState: {
        ...json.appState,
        exportWithDarkMode: false,
        exportBackground: false,
      },
      files: json.files,
    });
    svgEl.style.maxWidth = '100%';
    svgEl.style.height = 'auto';
    container.innerHTML = '';
    container.appendChild(svgEl);
  } catch (err) {
    console.error('Excalidraw render failed for ' + src, err);
    container.innerHTML = '<p><em>Failed to load diagram</em></p>';
  }
});
</script>
{{- end -}}
